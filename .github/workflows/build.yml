name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Cache BuildTools
        id: cache-buildtools
        uses: actions/cache@v3
        with:
          path: tools/BuildTools.jar
          key: buildtools-1.21.11

      - name: Download BuildTools if missing
        if: steps.cache-buildtools.outputs.cache-hit != 'true'
        run: |
          mkdir -p tools
          curl -o tools/BuildTools.jar https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar

      - name: Cache remapped NMS
        id: cache-nms
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository/net/minecraft
          key: nms-1.21.11

      - name: Remap NMS
        if: steps.cache-nms.outputs.cache-hit != 'true'
        run: |
          java -jar tools/BuildTools.jar --rev 1.21.11 --remapped

      - name: Build with Maven
        run: mvn clean package -Drevision=${GITHUB_REF_NAME#v} -DskipTests

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: fakeplayer.jar
          path: target/*.jar